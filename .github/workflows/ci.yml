name: CI

# Automated verification gate for the CI-triage loop.
# This workflow is the red/green oracle the loop reads (see .claude/LOOP.md).
# It runs on every push to main and on every pull request, so any code update
# is verified without a human in the room.
#
# Blocking signal = build + test. Lint is non-blocking (continue-on-error)
# because the repo has no ESLint config yet (no .eslintrc*/eslint.config.*);
# adding one is tracked as an escalation in .claude/ci-triage-state.md.
#
# Lockfiles are intentionally gitignored (see repo .gitignore "keep only one
# type"), so installs use `npm install` (not `npm ci`) and there is no npm
# cache. Backend needs --legacy-peer-deps: @nestjs/serve-static@5 peer-requires
# @nestjs/common@^11 while the app is on NestJS 10.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (build · test)
    runs-on: ubuntu-latest
    strategy:
      # Surface every job's failure, not just the first — the triage loop
      # classifies the full set of failures in one pass.
      fail-fast: false
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Generate Prisma client
        # Required: backend specs import generated types (e.g. DependencyType).
        # NOT `prisma migrate deploy` — there is no prisma/migrations/ dir.
        run: npm run prisma:generate
      - name: Lint (non-blocking — no ESLint config yet)
        continue-on-error: true
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test -- --passWithNoTests

      # --- Future integration tests against a real database -------------------
      # Current backend specs mock PrismaService, so no DB is needed yet. When
      # integration tests are added, enable a Postgres service and use
      # `npx prisma db push` (NOT `migrate deploy` — no migrations dir):
      #
      # services:
      #   postgres:
      #     image: postgres:15
      #     env: { POSTGRES_USER: prereq, POSTGRES_PASSWORD: prereq, POSTGRES_DB: prereq_test }
      #     ports: ['5432:5432']
      #     options: >-
      #       --health-cmd pg_isready --health-interval 10s
      #       --health-timeout 5s --health-retries 5
      # env:
      #   DATABASE_URL: postgresql://prereq:prereq@localhost:5432/prereq_test
      # (run `npx prisma db push` before the test step)

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint (non-blocking — no ESLint config yet)
        continue-on-error: true
        run: npm run lint
      - name: Build
        run: npm run build

  infrastructure:
    name: infrastructure (build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build
        run: npm run build
      - name: Test
        # No CDK tests exist yet; keep green until they are added.
        run: npm test -- --passWithNoTests
