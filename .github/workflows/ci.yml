name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # prisma generate validates the schema's datasource block, which
      # references env("DATABASE_URL"). No DB connection is made for unit tests.
      DATABASE_URL: postgresql://user:pass@localhost:5432/prereq?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run tests
        run: npm test

  backend-e2e:
    name: Backend e2e tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prereq
          POSTGRES_PASSWORD: prereq
          POSTGRES_DB: prereq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://prereq:prereq@localhost:5432/prereq_test?schema=public
      JWT_SECRET: ci-e2e-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push schema to the test database
        run: npx prisma db push --skip-generate
      - name: Run e2e tests
        run: npm run test:e2e

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run tests
        run: npm test
